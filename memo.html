    <title>Memórias</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4e415c, #143875);
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background-image: url("visu.jpg");
            background-size: cover;
            background-position: center;

            filter: blur(8px);
            z-index: -1;
        }

        h1 {
            text-align: center;
            font-size: 50px;        }

        p {
            text-align: center;
            color: #bbb;
            margin-bottom: 40px;
        }

        .galeria {
            padding: 50px;
            columns: 3;
            column-gap: 15px;
        }

        .item {
            margin-bottom: 15px;
            break-inside: avoid;
        }

        .item img,
        .item video {
            width: 100%;
            border-radius: 18px;
            transition: 0.3s;
            cursor: pointer;
            display: block;
        }

        .item img:hover,
        .item video:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        video {
            background: black;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #777;
        }

        @media(max-width:900px) {
            .galeria {
                columns: 3;
            }

        h1{
            font-size: 40px;
            margin-top: 40px;
        }
        }
    </style>
</head>
